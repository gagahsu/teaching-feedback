<div style="min-height:100vh;background:radial-gradient(1100px 560px at 82% -12%,rgba(56,189,248,0.09),transparent),#0b1120;padding:28px 24px 64px;">
<div style="max-width:1180px;margin:0 auto;">

  <!-- Header -->
  <header style="display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:13px;">
      <div style="width:44px;height:44px;border-radius:13px;background:linear-gradient(150deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:21px;color:#04263a;">教</div>
      <div>
        <div style="font-size:18px;font-weight:700;color:#f1f5f9;">每日教學回饋</div>
        <div style="font-size:12.5px;color:#64748b;">資料結構與演算法 &middot; 進階班</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:13px;">
      <span style="font-size:12.5px;color:#64748b;">{{auth.name}} ({{auth.isTeacher ? '老師' : '學生'}})</span>
      <button (click)="logout()" style="background:transparent;border:1px solid #1e2a44;color:#94a3b8;border-radius:10px;padding:6px 14px;cursor:pointer;font-size:12.5px;font-family:inherit;">登出</button>
    </div>
  </header>

  <!-- Help Banner -->
  <div *ngIf="auth.isTeacher && totalHelp > 0"
    style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:linear-gradient(120deg,rgba(251,113,133,0.12),rgba(251,113,133,0.03));border:1px solid rgba(251,113,133,0.35);border-radius:14px;padding:14px 18px;margin-bottom:18px;">
    <div style="width:34px;height:34px;border-radius:10px;background:rgba(251,113,133,0.18);display:flex;align-items:center;justify-content:center;color:#fb7185;font-weight:800;font-size:18px;flex-shrink:0;">!</div>
    <div style="flex:1;">
      <div style="font-size:14px;font-weight:700;color:#fecdd3;">本月有 {{totalHelp}} 則求救待回覆</div>
      <div style="font-size:12.5px;color:#fb91a0;margin-top:2px;">點下方日期前往回覆，標記已解決後就會從這裡消失</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button *ngFor="let hd of helpDays" (click)="openDay(hd.date)"
        style="background:rgba(251,113,133,0.16);border:1px solid rgba(251,113,133,0.4);color:#fecdd3;border-radius:9px;padding:6px 13px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit;">
        {{hd.label}}
      </button>
    </div>
  </div>

  <!-- Month Nav -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:14px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <button (click)="prev()" style="width:38px;height:38px;border-radius:10px;background:#0f1b30;border:1px solid #1e2a44;color:#cbd5e1;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;">&lsaquo;</button>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:25px;font-weight:600;color:#f1f5f9;min-width:150px;text-align:center;">{{monthLabel}}</div>
      <button (click)="next()" style="width:38px;height:38px;border-radius:10px;background:#0f1b30;border:1px solid #1e2a44;color:#cbd5e1;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;">&rsaquo;</button>
      <button (click)="goToday()" style="background:transparent;border:1px solid #1e2a44;color:#94a3b8;border-radius:10px;padding:0 15px;height:38px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;">今天</button>
    </div>
    <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:#64748b;">
      <span style="display:flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:3px;background:#38bdf8;"></span>有課程</span>
      <span style="display:flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:999px;background:#fb7185;"></span>有求救訊息</span>
    </div>
  </div>

  <!-- Weekday headers -->
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:10px;">
    <div style="text-align:center;font-size:12.5px;font-weight:600;color:#fca5a5;padding:4px;">週日</div>
    <div *ngFor="let d of ['週一','週二','週三','週四','週五']" style="text-align:center;font-size:12.5px;font-weight:600;color:#64748b;padding:4px;">{{d}}</div>
    <div style="text-align:center;font-size:12.5px;font-weight:600;color:#93c5fd;padding:4px;">週六</div>
  </div>

  <!-- Calendar weeks -->
  <div *ngFor="let week of weeks" style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:10px;">
    <div *ngFor="let cell of week"
      (click)="openDay(cell.date)"
      [class.other-month]="!cell.inMonth"
      [style]="cell.isToday
        ? 'min-height:106px;padding:11px 11px 9px;border-radius:16px;display:flex;flex-direction:column;gap:7px;cursor:pointer;background:linear-gradient(160deg,rgba(56,189,248,0.16),rgba(56,189,248,0.03));border:1.5px solid #38bdf8;box-shadow:0 0 0 1px rgba(56,189,248,0.15),0 10px 28px -14px rgba(56,189,248,0.6);'
        : !cell.inMonth
        ? 'min-height:106px;padding:11px 11px 9px;border-radius:16px;display:flex;flex-direction:column;gap:7px;cursor:pointer;background:transparent;border:1px solid rgba(30,42,68,0.55);opacity:.42;'
        : 'min-height:106px;padding:11px 11px 9px;border-radius:16px;display:flex;flex-direction:column;gap:7px;cursor:pointer;background:#0f1b30;border:1px solid #1e2a44;transition:border-color .15s,transform .12s;'">

      <div [style.color]="cell.isToday ? '#38bdf8' : cell.inMonth ? '#e2e8f0' : '#475569'"
        style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;line-height:1;">{{cell.dayNum}}</div>

      <div *ngIf="cell.course?.title"
        style="font-size:12px;line-height:1.35;font-weight:500;color:#dbeafe;background:rgba(56,189,248,0.1);border-left:2px solid #38bdf8;padding:5px 8px;border-radius:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">
        {{cell.course?.title}}
      </div>

      <div style="margin-top:auto;display:flex;gap:5px;flex-wrap:wrap;">
        <span *ngIf="cell.course && cell.course.msgCount > 0"
          style="font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:999px;color:#94a3b8;background:rgba(148,163,184,0.12);white-space:nowrap;">{{cell.course.msgCount}} 則</span>
        <span *ngIf="cell.course && cell.course.helpCount > 0"
          style="font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;color:#fb7185;background:rgba(251,113,133,0.15);white-space:nowrap;">求救 {{cell.course.helpCount}}</span>
      </div>
    </div>
  </div>

</div>
</div>
